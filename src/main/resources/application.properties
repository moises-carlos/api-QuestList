spring.application.name=QuestList

# Usa a porta vinda da nuvem ou 8080 localmente
server.port=${PORT:8080}

# Habilita o carregamento de senhas locais num arquivo .env escondido
spring.config.import=optional:file:.env

# Permite conectar ao banco do Render (se configurado) ou ao local por padrao
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/questlist}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
